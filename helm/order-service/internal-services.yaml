apiVersion: v1
kind: Service
metadata:
  name: order-service-blue-internal
  namespace: apps
spec:
  selector:
    app: order-service
    color: blue
  ports:
  - port: 5000
    targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: order-service-green-internal
  namespace: apps
spec:
  selector:
    app: order-service
    color: green
  ports:
  - port: 5000
    targetPort: 5000