apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-blue
  namespace: apps
  labels:
    app: order-service
    color: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
      color: blue
  template:
    metadata:
      labels:
        app: order-service
        color: blue
    spec:
      containers:
      - name: order-service
        image: archana2026/order-service:v1
        ports:
        - containerPort: 5000
        env:
        - name: USER_SERVICE_URL
          value: "http://user-service:5000"