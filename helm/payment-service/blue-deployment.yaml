apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-blue
  namespace: apps
  labels:
    app: payment-service
    color: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
      color: blue
  template:
    metadata:
      labels:
        app: payment-service
        color: blue
    spec:
      containers:
      - name: payment-service
        image: archana2026/payment-service:v1
        ports:
        - containerPort: 5000
        env:
        - name: ORDER_SERVICE_URL
          value: "http://order-service:5000"