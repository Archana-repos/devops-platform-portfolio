apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-green
  namespace: apps
  labels:
    app: user-service
    color: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
      color: green
  template:
    metadata:
      labels:
        app: user-service
        color: green
    spec:
      containers:
      - name: user-service
        image: archana2026/user-service:v1
        ports:
        - containerPort: 5000